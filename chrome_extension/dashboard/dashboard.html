<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Digital Wellbeing Dashboard</title>
    <style>
      :root {
        --ink: #192739;
        --muted: #55667e;
        --card: rgba(255, 255, 255, 0.88);
        --stroke: rgba(25, 39, 57, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 28px 18px;
        color: var(--ink);
        font: 15px/1.45 "Bahnschrift", "Segoe UI Variable", "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 500px at 105% -5%, rgba(31, 111, 235, 0.25), transparent 58%),
          radial-gradient(900px 420px at -10% 110%, rgba(14, 159, 110, 0.22), transparent 55%),
          linear-gradient(165deg, #f8f0e5 0%, #eef4ff 55%, #e6f1ff 100%);
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        display: grid;
        gap: 14px;
      }

      .hero,
      .card {
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: 18px;
        box-shadow: 0 14px 34px rgba(19, 34, 54, 0.12);
        backdrop-filter: blur(9px);
      }

      .hero {
        padding: 20px;
      }

      .kicker {
        margin: 0;
        color: #3f5675;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
      }

      h1 {
        margin: 4px 0;
        font-size: 28px;
      }

      #dateLabel {
        color: var(--muted);
        font-size: 14px;
      }

      .big {
        font-size: 42px;
        font-weight: 800;
        margin-top: 8px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin-top: 8px;
      }

      .metric {
        border-radius: 12px;
        padding: 12px;
        border: 1px solid var(--stroke);
      }

      .metric.good {
        background: rgba(14, 159, 110, 0.12);
      }

      .metric.bad {
        background: rgba(186, 54, 54, 0.12);
      }

      .metric .label {
        color: var(--muted);
        font-size: 12px;
      }

      .metric .value {
        font-size: 28px;
        font-weight: 800;
      }

      .card {
        padding: 16px;
      }

      h2 {
        margin: 0 0 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.7);
      }

      th,
      td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid rgba(25, 39, 57, 0.08);
      }

      th {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #445771;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <p class="kicker">Digital Wellbeing</p>
        <h1>Usage Dashboard</h1>
        <div id="dateLabel">Date: today</div>
        <div class="big" id="totalTime">0 min</div>

        <div class="metric-grid">
          <div class="metric good">
            <div class="label">Productive</div>
            <div class="value" id="productiveTime">0 min</div>
          </div>
          <div class="metric bad">
            <div class="label">Unproductive</div>
            <div class="value" id="unproductiveTime">0 min</div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Domain Usage</h2>
        <table>
          <thead>
            <tr>
              <th>Domain</th>
              <th>Type</th>
              <th>Minutes</th>
            </tr>
          </thead>
          <tbody id="domainTableBody"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>Interventions</h2>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Domain</th>
              <th>Mode</th>
              <th>Reason</th>
            </tr>
          </thead>
          <tbody id="interventionTableBody"></tbody>
        </table>
      </section>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
