<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Digital Wellbeing Dashboard</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font: 15px/1.5 "Segoe UI", Arial, sans-serif;
        color: #0f172a;
        background: linear-gradient(135deg, #f0fdf4, #ecfeff);
      }
      .card {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 16px 30px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin-top: 0;
      }
      .big {
        font-size: 36px;
        font-weight: 800;
        margin: 6px 0 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #e2e8f0;
      }
      th {
        color: #334155;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Digital Wellbeing Dashboard</h1>
      <div id="dateLabel"></div>
      <div class="big" id="totalTime">0 min</div>

      <h2>Domain Usage</h2>
      <table>
        <thead>
          <tr>
            <th>Domain</th>
            <th>Minutes</th>
          </tr>
        </thead>
        <tbody id="domainTableBody"></tbody>
      </table>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
