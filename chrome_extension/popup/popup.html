<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Digital Wellbeing</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="card">
      <h1>Digital Wellbeing</h1>
      <div class="muted" id="dayLabel">Today</div>
      <div class="stat" id="totalTime">0 min</div>

      <div class="row">
        <label for="enabled">Enabled</label>
        <input id="enabled" type="checkbox" checked>
      </div>
      <div class="row">
        <label for="soft">Soft limit (min)</label>
        <input id="soft" type="number" min="5" step="5" value="45">
      </div>
      <div class="row">
        <label for="hard">Hard limit (min)</label>
        <input id="hard" type="number" min="10" step="5" value="120">
      </div>
      <div class="row">
        <label for="strictness">Mode</label>
        <select id="strictness">
          <option value="relaxed">Relaxed</option>
          <option value="balanced" selected>Balanced</option>
          <option value="strict">Strict</option>
        </select>
      </div>

      <div class="row check-row">
        <label for="enableReminders">Reminders</label>
        <input id="enableReminders" type="checkbox" checked>
      </div>
      <div class="row check-row">
        <label for="enableGrayFilter">Gray filter</label>
        <input id="enableGrayFilter" type="checkbox" checked>
      </div>
      <div class="row check-row">
        <label for="enableSlowMode">Slow interactions</label>
        <input id="enableSlowMode" type="checkbox" checked>
      </div>
      <div class="row check-row">
        <label for="enableShutterMode">Shutter lock</label>
        <input id="enableShutterMode" type="checkbox" checked>
      </div>

      <label class="label-block" for="productiveDomains">Productive domains (comma-separated)</label>
      <textarea id="productiveDomains" rows="3" placeholder="github.com, docs.google.com, notion.so"></textarea>

      <button id="saveBtn">Save settings</button>
      <button id="startSprintBtn" type="button">Start Focus Sprint (25m)</button>
      <button id="cancelSprintBtn" type="button">Cancel Focus Sprint</button>
      <button id="openDashboardBtn" class="action-link" type="button">Open Dashboard</button>
      <button id="resetTodayBtn" class="danger-btn" type="button">Reset Today Data</button>

      <div class="muted" id="focusSprintStatus"></div>

      <h3>Top domains</h3>
      <ul id="topDomains"></ul>
      <div class="muted" id="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
